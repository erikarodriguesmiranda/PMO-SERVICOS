// HELPERS
// ─────────────────────────────────────────────
function statusPill(s) {
    if (s === 'andamento') return `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-sky-100 text-sky-600">● Em andamento</span>`;
    return `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-600">● À iniciar</span>`;
}

function countProjects() {
    let total = 0, andamento = 0, iniciar = 0;
    appData.iniciativas.forEach(i => {
        if (i.tipo === 'iniciativa') {
            i.projetos.forEach(p => {
                total++;
                if (p.status === 'andamento') andamento++; else iniciar++;
            });
        }
    });
    return { total, andamento, iniciar };
}

function countByResp() {
    const map = {};
    appData.iniciativas.forEach(i => {
        if (i.tipo !== 'iniciativa') return;
        i.projetos.forEach(p => {
            p.responsavel.split('·').forEach(r => {
                const name = r.trim();
                map[name] = (map[name] || 0) + 1;
            });
        });
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]);
}

function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    appData.iniciativas.forEach(ini => {
        const count = ini.tipo === 'iniciativa' ? ini.projetos.length : null;
        const el = document.createElement('div');
        el.className = 'nav-item px-4 py-2.5 rounded flex items-center gap-3 text-sm font-medium text-slate-600 shrink-0';
        el.innerHTML = `
            <span class="text-base">${ini.icon}</span>
            <span class="flex-1 leading-tight">${ini.shortTitle}</span>
            ${count ? `<span class="text-xs bg-slate-100 text-slate-400 font-semibold px-1.5 py-0.5 rounded-full">${count}</span>` : ''}
        `;
        if (ini.id === 'overview') el.classList.add('active');
        el.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            ini.tipo === 'overview' ? renderOverview() : renderIniciativa(ini.id);
        });
        nav.appendChild(el);
    });
}

    document.getElementById('content-container').innerHTML = `

    document.getElementById('main-subtitle').textContent = sub;
}

function toggleAcc(id) {
    const content = document.getElementById(id);
    const icon = document.getElementById('icon-' + id);
    const isOpen = content.classList.contains('open');
    // close others
    document.querySelectorAll('.accordion-content.open').forEach(el => {
        if (el.id !== id) {
            el.classList.remove('open');
            const i = document.getElementById('icon-' + el.id);
            if (i) { i.classList.remove('rotated'); i.style.transform = ''; }
        }
    });
    content.classList.toggle('open', !isOpen);
    icon.classList.toggle('rotated', !isOpen);
}

function navTo(id) {
    const nav = document.querySelectorAll('.nav-item');
    nav.forEach(n => n.classList.remove('active'));
    const items = [...nav];
    const ini = appData.iniciativas.find(i => i.id === id);
    if (!ini) return;
    const idx = appData.iniciativas.indexOf(ini);
    if (items[idx]) items[idx].classList.add('active');
    renderIniciativa(id);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    renderSidebar();
    renderOverview();
});
</script>
</body>
